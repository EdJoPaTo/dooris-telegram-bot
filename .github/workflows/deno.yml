name: Build deno

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Setup repo
        uses: actions/checkout@v2

      - uses: denoland/setup-deno@main
        with:
          deno-version: v1.x

      - name: Cache Dependencies
        run: deno cache source/index.ts

      - name: Check Formatting
        run: deno fmt --check

      - name: Check (via workaround)
        run: deno bundle source/index.ts > /dev/null

      # - name: Run Tests
      #   run: deno test
